version: "3.9"

services:
  mysql:
    image: mysql:8.4

    container_name: criptoradar_mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  streamlit:
    build: .

    container_name: criptoradar_app

    restart: unless-stopped

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: